name: Auto-Generate Content

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Topic override (optional)"
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Generate content with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are writing a blog post for TechBlips (techblips.com).
            Author: Henry. Style: conversational, opinionated, developer-focused.

            STRICT RULES - DO NOT violate these:
            - NEVER use "## Hook" or "## Introduction" as section headers
            - NEVER add <!-- seo-optimized --> or any HTML comments as markers
            - NEVER embed affiliate links in code fence language tags
            - NEVER use the same post structure twice in a row
            - NEVER cut off mid-sentence - always finish your thoughts
            - Keep keywords in frontmatter to 3-4 max, not 7-8
            - Vary your narrative voice - don't always say "I tested this myself"
            - Write like a real person, not an AI. Include specific details, opinions, and occasional humor.

            Research a trending AI/dev-tools topic from the last 48 hours.
            Create a markdown file in content/posts/ with:
            - Filename: YYYY-MM-DD-slug.md (use today's date)
            - YAML frontmatter matching existing post format
            - 800-1500 words, SEO-friendly but natural
            - Practical developer angle
            - Related Articles section linking ONLY to posts that actually exist in content/posts/

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Auto-publish article"
          branch: auto-content/${{ github.run_id }}
          title: "[Auto] New article"
          body: "Auto-generated content for review. Please check for AI markers before merging."
