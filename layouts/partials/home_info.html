{{- with .Site.Params.homeInfoParams }}
<article class="home-info">
    <header class="entry-header">
        <h1>{{ .Title | markdownify }}</h1>
    </header>
    <div class="entry-content">
        {{ .Content | markdownify }}
    </div>
    <footer class="entry-footer">
        <div class="hero-buttons">
            {{ if eq $.Site.Language.Lang "ko" }}
            <a class="button primary" href="/ko/posts/">최신 글</a>
            <a class="button secondary" href="/radar/current/">테크 레이더</a>
            {{ else }}
            <a class="button primary" href="/posts/">Latest Posts</a>
            <a class="button secondary" href="/radar/current/">Tech Radar</a>
            {{ end }}
        </div>
    </footer>
</article>
{{- end -}}
