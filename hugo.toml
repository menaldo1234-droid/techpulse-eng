baseURL = "https://techblips.com/"
title = "TechBlips"
theme = "PaperMod"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[pagination]
  pagerSize = 10

[languages]
  [languages.en]
    languageName = "EN"
    weight = 1
    languageCode = "en-us"
    [languages.en.params]
      description = "AI, tech trends, and the future — explained fast."
      [languages.en.params.homeInfoParams]
        Title = "The Pulse of Modern Engineering"
        Content = "Deep dives into AI, high-performance infrastructure, and the tools shaping the future of software."
    [[languages.en.menu.main]]
      identifier = "home"
      name = "Home"
      url = "/"
      weight = 10
    [[languages.en.menu.main]]
      identifier = "blog"
      name = "Blog"
      url = "/posts/"
      weight = 20
    [[languages.en.menu.main]]
      identifier = "radar"
      name = "Radar"
      url = "/radar/current/"
      weight = 30
    [[languages.en.menu.main]]
      identifier = "about"
      name = "About"
      url = "/about/"
      weight = 40

  [languages.ko]
    languageName = "KO"
    weight = 2
    languageCode = "ko-kr"
    [languages.ko.params]
      description = "AI, 테크 트렌드, 미래 기술 — 빠르고 핵심만."
      [languages.ko.params.homeInfoParams]
        Title = "테크의 핵심을 빠르게"
        Content = "AI, 고성능 인프라, 소프트웨어의 미래를 바꾸는 도구들. 쓸데없는 말 빼고 핵심만."
    [[languages.ko.menu.main]]
      identifier = "home"
      name = "홈"
      url = "/ko/"
      weight = 10
    [[languages.ko.menu.main]]
      identifier = "blog"
      name = "블로그"
      url = "/ko/posts/"
      weight = 20
    [[languages.ko.menu.main]]
      identifier = "radar"
      name = "레이더"
      url = "/radar/current/"
      weight = 30
    [[languages.ko.menu.main]]
      identifier = "about"
      name = "소개"
      url = "/ko/about/"
      weight = 40

[params]
  mainSections = ["posts"]
  env = "production"
  author = "Henry"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  comments = false
  defaultTheme = "light"
  disableThemeToggle = false

  [params.label]
    text = "TechBlips"
    icon = "/logo.svg"
    iconHeight = 35

[params.assets]
  disableFingerprinting = false

[params.cover]
  hiddenInList = false
  hiddenInSingle = false

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  threshold = 0.4

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 2
    ordered = false
  [markup.highlight]
    style = "dracula"
    lineNos = false
    codeFences = true

[sitemap]
  changefreq = "daily"
  priority = 0.5

[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
  disableJSON = false
  disableSVG = false
  disableXML = false
  minifyOutput = true
