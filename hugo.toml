baseURL = "https://techblips.com/"
languageCode = "en-us"
title = "TechBlips"
theme = "PaperMod"
[pagination]
  pagerSize = 10

[params]
  mainSections = ["posts"]
  env = "production"
  description = "AI, tech trends, and the future — explained fast. Quick tech blips on Claude updates, breakthrough tools, and the tech that matters."
  author = "Henry"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  comments = false
  defaultTheme = "light"
  disableThemeToggle = false

  [params.homeInfoParams]
    Title = "⚡ TechBlips"
    Content = """Your daily dose of AI updates, dev tool drops, and tech that's actually changing things.
Written by Henry — no corporate fluff, just real takes on what matters in tech right now."""


  [params.label]
    text = "⚡ TechBlips"
    icon = ""
    iconHeight = 35

[params.assets]
  disableFingerprinting = false

[params.cover]
  hiddenInList = false
  hiddenInSingle = false

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  threshold = 0.4

[menu]
  [[menu.main]]
    identifier = "ai"
    name = "🤖 AI"
    url = "/categories/artificial-intelligence/"
    weight = 10
  [[menu.main]]
    identifier = "devtools"
    name = "🛠 Dev Tools"
    url = "/categories/developer-tools/"
    weight = 20
  [[menu.main]]
    identifier = "trending"
    name = "🔥 Trending"
    url = "/categories/technology/"
    weight = 30
  [[menu.main]]
    identifier = "radar"
    name = "📡 Radar"
    url = "/radar/current/"
    weight = 35
  [[menu.main]]
    identifier = "search"
    name = "🔍 Search"
    url = "/search/"
    weight = 40
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 50

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 2
    ordered = false
  [markup.highlight]
    style = "dracula"
    lineNos = false
    codeFences = true

[sitemap]
  changefreq = "daily"
  priority = 0.5

[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
  disableJSON = false
  disableSVG = false
  disableXML = false
  minifyOutput = true
