baseURL = "https://techblips.com/"
title = "TechBlips"
theme = "PaperMod"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[pagination]
  pagerSize = 10

[languages]
  [languages.en]
    languageName = "EN"
    weight = 1
    languageCode = "en-us"
    [languages.en.params]
      description = "Engineer Study — learning real tech from scratch, documented as we go."
      [languages.en.params.homeInfoParams]
        Title = "Engineer Study"
        Content = "Learning by doing. STM32, RTOS, PCB, embedded systems — studied from scratch, recorded on YouTube, and documented here."
    [[languages.en.menu.main]]
      identifier = "home"
      name = "Home"
      url = "/"
      weight = 10
    [[languages.en.menu.main]]
      identifier = "study"
      name = "Study"
      url = "/study/"
      weight = 20
    [[languages.en.menu.main]]
      identifier = "radar"
      name = "Radar"
      url = "/radar/current/"
      weight = 30
    [[languages.en.menu.main]]
      identifier = "about"
      name = "About"
      url = "/about/"
      weight = 40

  [languages.ko]
    languageName = "KO"
    weight = 2
    languageCode = "ko-kr"
    [languages.ko.params]
      description = "엔지니어 스터디 — 처음부터 공부하며 기록하는 진짜 엔지니어링."
      [languages.ko.params.homeInfoParams]
        Title = "엔지니어 스터디"
        Content = "직접 공부하며 기록합니다. STM32, RTOS, PCB, 임베디드 — 유튜브 영상 + 정리글로 함께 배워요."
    [[languages.ko.menu.main]]
      identifier = "home"
      name = "홈"
      url = "/ko/"
      weight = 10
    [[languages.ko.menu.main]]
      identifier = "study"
      name = "스터디"
      url = "/ko/study/"
      weight = 20
    [[languages.ko.menu.main]]
      identifier = "radar"
      name = "레이더"
      url = "/radar/current/"
      weight = 30
    [[languages.ko.menu.main]]
      identifier = "about"
      name = "소개"
      url = "/ko/about/"
      weight = 40

[params]
  mainSections = ["study", "posts"]
  env = "production"
  author = "Henry"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  comments = false
  defaultTheme = "light"
  disableThemeToggle = false

  [params.label]
    text = "TechBlips"
    icon = "/logo.svg"
    iconHeight = 35

[params.assets]
  disableFingerprinting = false

[params.cover]
  hiddenInList = false
  hiddenInSingle = false

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  threshold = 0.4

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 2
    ordered = false
  [markup.highlight]
    style = "dracula"
    lineNos = false
    codeFences = true

[sitemap]
  changefreq = "daily"
  priority = 0.5

[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
  disableJSON = false
  disableSVG = false
  disableXML = false
  minifyOutput = true
